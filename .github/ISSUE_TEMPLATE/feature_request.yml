name: Feature request
description: Propose a change to the trust primitive, the agent runtime, or the tooling.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case, not the implementation.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: checkboxes
    id: scope
    attributes:
      label: Does this change the trust model?
      description: |
        Changes to the commitment scheme, the stake/challenge/slash economics, or the
        on-chain storage layout need an ADR in `docs/adr/` before implementation.
      options:
        - label: This changes the commitment scheme, contract storage, or slashing economics
        - label: This is additive and does not alter existing on-chain semantics
