# ─────────────────────────────────────────────────────────────────────────────
# marketing.conf — static-serve config baked into the marketing image.
# Serves the Next.js static export (`out/`) from /usr/share/nginx/html.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compress text assets on the fly.
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        image/svg+xml application/xml;

    # Long-cache the hashed Next static chunks; they are content-addressed.
    location /_next/static/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Static export emits `page.html` files; try the path, then `.html`, then
    # the directory index, finally fall back to the SPA-style 404 page.
    location / {
        try_files $uri $uri.html $uri/index.html $uri/ /index.html;
    }

    # Lightweight liveness endpoint for healthchecks / load balancers.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    error_page 404 /404.html;
}
