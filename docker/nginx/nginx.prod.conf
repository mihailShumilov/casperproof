# ─────────────────────────────────────────────────────────────────────────────
# nginx.prod.conf — production reverse proxy (mounted by the `nginx` service in
# docker-compose.prod.yml).
#
#   casperproof.com, www.casperproof.com  → marketing (static export, :80)
#   app.casperproof.com                   → web (Next.js standalone, :3000)
#
# TLS-ready: drop certs at /etc/nginx/certs and uncomment the 443 blocks.
# For automated certs, run certbot or an acme-companion sidecar (see the
# commented `certbot` service in docker-compose.prod.yml) and point the
# ssl_certificate paths at the issued fullchain/privkey.
# ─────────────────────────────────────────────────────────────────────────────

upstream marketing_upstream {
    server marketing:80;
}

upstream web_upstream {
    server web:3000;
}

# Shared proxy headers.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── ACME challenge + HTTP→HTTPS redirect ─────────────────────────────────────
# In plain-HTTP mode (no certs yet) this server simply proxies. Once certs are
# present, switch the `location /` block to a 301 redirect to https.
server {
    listen      80;
    listen      [::]:80;
    server_name casperproof.com www.casperproof.com;

    # Let's Encrypt HTTP-01 challenge files (written by certbot to this volume).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        # TLS enabled? Replace the proxy below with:
        #   return 301 https://$host$request_uri;
        proxy_pass         http://marketing_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

server {
    listen      80;
    listen      [::]:80;
    server_name app.casperproof.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass         http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

