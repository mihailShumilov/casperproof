  <text x="80" y="350" font-family="system-ui, sans-serif" font-size="34" font-weight="500" fill="#9aa0aa">15 on-chain factors · stake-backed · verifiable on Casper</text>
  <g transform="translate(80,430)" font-family="ui-monospace, monospace" font-size="22" fill="#5d636e">
